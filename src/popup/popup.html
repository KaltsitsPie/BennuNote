<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      color: #2D3530;
    }
    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-icon {
      width: 24px;
      height: 24px;
    }
    .status {
      font-size: 13px;
      color: #9AA097;
      margin-bottom: 12px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #717A5A;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #626A4C; }
    .btn:disabled {
      background: #C8CEC9;
      cursor: not-allowed;
    }
    .lang-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .lang-row label {
      font-size: 13px;
      color: #5A6358;
      white-space: nowrap;
    }
    .lang-select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #D8DDD9;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
    }
    .lang-select:focus {
      outline: none;
      border-color: #717A5A;
      box-shadow: 0 0 0 2px rgba(113,122,90,0.18);
    }
  </style>
</head>
<body>
  <div class="title">BennuNote</div>
  <div class="status" id="status">
    <span id="status-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ccc;margin-right:6px;vertical-align:middle;"></span>
    <span id="status-text">Checking service...</span>
  </div>
  <div class="lang-row">
    <label for="lang-select">Language</label>
    <select class="lang-select" id="lang-select">
      <option value="zh" selected>中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>
  </div>
  <button class="btn" id="extract-btn">Extract Subtitles</button>
  <script type="module" src="popup.ts"></script>
</body>
</html>
